<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bassie's Bloom Tree - Persistent</title>
    <style>
        :root { 
            --bg: #1e1b29; 
            --lavender-haze: rgba(147, 112, 219, 0.7);
            --bassie-pink: #ffb7c5;
            --bassie-purple: #9370db;
            --locked: #2d2a3d; 
            --unlocked: #483d8b; 
        }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        #game-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: radial-gradient(circle, #2d2a3d 0%, #1e1b29 100%); }
        #stats { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 15px; border: 2px solid var(--bassie-purple); }
        .big-count { font-size: 3rem; color: var(--bassie-pink); font-weight: bold; text-shadow: 0 0 10px var(--bassie-purple); }
        
        /* Growing Flower */
        #cookie { font-size: 150px; cursor: pointer; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); user-select: none; filter: hue-rotate(280deg); }
        #cookie:active { transform: scale(0.8); }

        #tree-overlay { position: fixed; inset: 0; background: #13111c; display: none; z-index: 1000; overflow: auto; padding: 50px; }
        .tree-wrapper { position: relative; width: 1000px; margin: 0 auto; height: 1800px; padding-top: 50px; }
        
        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        line { stroke: #333; stroke-width: 5; stroke-linecap: round; }
        line.active { stroke: var(--bassie-purple); filter: drop-shadow(0 0 5px var(--bassie-pink)); }

        .node { 
            position: absolute; width: 130px; height: 130px; background: var(--locked);
            border: 4px solid #444; border-radius: 50%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; font-size: 0.75rem;
            cursor: pointer; transition: 0.4s; transform: translateX(-50%); z-index: 2;
        }
        .node.available { background: var(--unlocked); border-color: var(--bassie-purple); }
        .node.purchased { background: var(--bassie-purple); border-color: var(--bassie-pink); box-shadow: 0 0 25px var(--bassie-purple); }
        .node.locked::after { content: ""; position: absolute; inset: -5px; background: var(--lavender-haze); border-radius: 50%; filter: blur(8px); pointer-events: none; }
        
        .btn-ui { padding: 15px 40px; background: var(--bassie-purple); color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        .save-msg { position: fixed; bottom: 20px; right: 20px; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body onclick="startMusic()">

    <div id="game-view">
        <div id="stats">
            <div>Petals: <span class="big-count" id="count">0</span></div>
            <div>CPS: <span id="cps">0</span></div>
        </div>
        <div id="cookie">🌸</div>
        <button class="btn-ui" style="margin-top: 50px;" onclick="toggleTree()">BLOOM TREE</button>
        <button onclick="resetGame()" style="margin-top: 10px; background:none; border:none; color:#444; cursor:pointer;">Reset Save</button>
    </div>

    <div id="tree-overlay">
        <button class="btn-ui" style="position:fixed; top:20px; right:20px; z-index:1001; background:#6b21a8;" onclick="toggleTree()">EXIT</button>
        <div class="tree-wrapper">
            <svg id="tree-svg"></svg>
            <div id="nodes-container"></div>
        </div>
    </div>

    <div class="save-msg">Progress saves automatically ✨</div>

    <audio id="bg-music" loop>
        <source src="https://www.bensound.com" type="audio/mpeg">
    </audio>

    <script>
        let musicStarted = false;
        const buySfx = new Audio('https://www.zapsplat.com');
        const clickSfx = new Audio('https://www.zapsplat.com');

        let game = {
            cookies: 0,
            cps: 0,
            upgrades: {
                root: { name: "Bassie's Seed", icon: "🌱", cost: 15, power: 1, count: 0, req: null, x: 50, y: 50 },
                water: { name: "Dew Drop", icon: "💧", cost: 100, power: 5, count: 0, req: 'root', x: 30, y: 300 },
                sun: { name: "Soft Glow", icon: "☀️", cost: 150, power: 8, count: 0, req: 'root', x: 70, y: 300 },
                mist: { name: "Lavender Mist", icon: "🌫️", cost: 500, power: 20, count: 0, req: 'water', x: 20, y: 550 },
                bloom: { name: "Spring Bloom", icon: "🌻", cost: 800, power: 35, count: 0, req: 'sun', x: 80, y: 550 },
                spirit: { name: "Bassie's Spirit", icon: "👻", cost: 5000, power: 150, count: 0, req: 'mist', x: 50, y: 800 },
                bassie: { name: "Bassie", icon: "🧺", cost: 50000, power: 1000, count: 0, req: 'spirit', x: 50, y: 1100 }
            }
        };

        // SAVE & LOAD LOGIC
        function save() {
            localStorage.setItem("BassieBloomSave", JSON.stringify(game));
        }

        function load() {
            const saved = localStorage.getItem("BassieBloomSave");
            if (saved) {
                const parsed = JSON.parse(saved);
                // Merge loaded counts/costs back into the structure
                game.cookies = parsed.cookies;
                game.cps = parsed.cps;
                for (let id in parsed.upgrades) {
                    if (game.upgrades[id]) {
                        game.upgrades[id].count = parsed.upgrades[id].count;
                        game.upgrades[id].cost = parsed.upgrades[id].cost;
                    }
                }
            }
        }

        function startMusic() {
            if (!musicStarted) {
                document.getElementById('bg-music').play().catch(()=>{});
                musicStarted = true;
            }
        }

        function initNodes() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = "";
            for (let id in game.upgrades) {
                const up = game.upgrades[id];
                const div = document.createElement('div');
                div.id = `node-${id}`;
                div.className = 'node';
                div.style.left = `${up.x}%`;
                div.style.top = `${up.y}px`;
                div.onclick = (e) => { e.stopPropagation(); buy(id); };
                div.innerHTML = `<div class="node-content"><span>${up.icon}</span><br><strong>${up.name}</strong><br><span id="cost-text-${id}" style="color:#ffb7c5">${up.cost}</span></div>`;
                container.appendChild(div);
            }
        }

        function buy(id) {
            const up = game.upgrades[id];
            if (up.req && game.upgrades[up.req].count === 0) return;
            if (game.cookies >= up.cost) {
                game.cookies -= up.cost;
                up.count++;
                game.cps += up.power;
                up.cost = Math.round(up.cost * 1.4);
                buySfx.play();
                update();
                drawLines();
                save();
            }
        }

        function drawLines() {
            const svg = document.getElementById('tree-svg');
            svg.innerHTML = '';
            for (let id in game.upgrades) {
                const up = game.upgrades[id];
                if (up.req) {
                    const parent = game.upgrades[up.req];
                    const line = document.createElementNS("http://www.w3.org", "line");
                    line.setAttribute("x1", `${parent.x}%`); line.setAttribute("y1", `${parent.y + 65}px`);
                    line.setAttribute("x2", `${up.x}%`); line.setAttribute("y2", `${up.y + 65}px`);
                    if (parent.count > 0) line.classList.add('active');
                    svg.appendChild(line);
                }
            }
        }

        function update() {
            document.getElementById('count').innerText = Math.floor(game.cookies);
            document.getElementById('cps').innerText = game.cps.toFixed(1);
            
            // Evolve the flower based on CPS
            const size = 150 + (Math.min(game.cps / 10, 100));
            const glow = Math.min(game.cps / 5, 40);
            const cookie = document.getElementById('cookie');
            cookie.style.fontSize = size + "px";
            cookie.style.filter = `hue-rotate(280deg) drop-shadow(0 0 ${glow}px var(--bassie-pink))`;

            for (let id in game.upgrades) {
                const up = game.upgrades[id];
                const el = document.getElementById(`node-${id}`);
                const costTxt = document.getElementById(`cost-text-${id}`);
                if(costTxt) costTxt.innerText = up.cost;

                if (up.count > 0) el.className = 'node purchased';
                else if (!up.req || game.upgrades[up.req].count > 0) el.className = 'node available';
                else el.className = 'node locked';
            }
        }

        function toggleTree() {
            const tree = document.getElementById('tree-overlay');
            tree.style.display = tree.style.display === 'block' ? 'none' : 'block';
            if(tree.style.display === 'block') drawLines();
        }

        function resetGame() {
            if(confirm("Erase all petals and start over?")) {
                localStorage.removeItem("BassieBloomSave");
                location.reload();
            }
        }

        document.getElementById('cookie').onclick = (e) => { 
            e.stopPropagation(); 
            game.cookies++; 
            clickSfx.currentTime = 0;
            clickSfx.play(); 
            update(); 
            if(game.cookies % 10 === 0) save(); // Autosave every 10 clicks
        };

        setInterval(() => { 
            game.cookies += game.cps/10; 
            update(); 
        }, 100);

        setInterval(save, 10000); // Autosave every 10 seconds

        window.onload = () => { 
            load();
            initNodes(); 
            update(); 
        };
    </script>
</body>
</html>
