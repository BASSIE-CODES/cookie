<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bassie's Wide Bloom Tree</title>
    <style>
        :root { 
            --bg: #13111c; 
            --haze: rgba(147, 112, 219, 0.9); 
            --pink: #ffb7c5; 
            --periwinkle: #b0c2ff; 
            --purple: #483d8b; 
        }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; }
        
        /* Stats Panel */
        #ui { width: 280px; background: #1e1b29; border-right: 3px solid var(--periwinkle); padding: 25px; z-index: 100; box-shadow: 10px 0 20px rgba(0,0,0,0.5); }
        .stat-val { font-size: 2.2rem; color: var(--pink); font-weight: bold; margin-bottom: 20px; }

        /* Tree Canvas */
        #viewport { flex: 1; overflow: auto; background: radial-gradient(circle, #2d2a3d 0%, #13111c 100%); cursor: grab; }
        #canvas { position: relative; width: 6000px; height: 8000px; }
        
        svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        line { stroke: #2d2a3d; stroke-width: 8; stroke-linecap: round; transition: 0.5s; }
        line.active { stroke: var(--periwinkle); filter: drop-shadow(0 0 8px var(--pink)); }

        /* Circular Nodes */
        .node { 
            position: absolute; width: 90px; height: 90px; background: #222;
            border: 5px solid #333; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; cursor: pointer; transition: 0.4s;
            transform: translate(-50%, -50%); z-index: 10;
        }
        .node.buyable { background: var(--purple); border-color: var(--periwinkle); }
        .node.owned { background: var(--pink); border-color: white; box-shadow: 0 0 25px var(--pink); color: black; }
        
        /* Haze System */
        .node.hidden { pointer-events: none; }
        .node.hidden::after {
            content: ""; position: absolute; inset: -40px; background: var(--haze);
            border-radius: 50%; filter: blur(25px); z-index: 15;
        }
        .node.hidden .label { opacity: 0; }
        
        .btn { width: 100%; padding: 15px; background: var(--periwinkle); border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="ui">
        <div style="color:var(--periwinkle)">Petals</div>
        <div id="score" class="stat-val">0</div>
        <div style="color:var(--periwinkle)">Petals/sec</div>
        <div id="cps" class="stat-val" style="font-size: 1.5rem;">0.0</div>
        <button class="btn" onclick="clickPetal()">GATHER PETALS</button>
        <p style="font-size:0.8rem; color:#666; margin-top:30px;">Drag to explore the 100+ branches!</p>
    </div>

    <div id="viewport">
        <div id="canvas">
            <svg id="svg-lines"></svg>
            <div id="node-layer"></div>
        </div>
    </div>

    <script>
        let state = { petals: 0, cps: 0, owned: ['root'] };
        const tree = {};
        const totalNodes = 110;

        function buildTree() {
            tree['root'] = { x: 3000, y: 150, cost: 0, power: 0, children: [], parent: null };
            let queue = ['root'];
            let count = 1;

            while (count <= totalNodes) {
                let pId = queue.shift();
                let pNode = tree[pId];
                
                // Force exactly 2-3 branches for wide growth
                let branches = 3;
                for (let b = 0; b < branches; b++) {
                    if (count > totalNodes) break;
                    let id = 's' + count;
                    let offsetX = (b - 1) * 500; // Wide 500px spacing
                    let offsetY = 400 + (Math.random() * 100); // Tall 400px spacing
                    
                    tree[id] = {
                        id: id,
                        x: pNode.x + offsetX,
                        y: pNode.y + offsetY,
                        cost: Math.floor(Math.pow(count, 1.9) * 20),
                        power: count * 1.5,
                        parent: pId,
                        children: []
                    };
                    pNode.children.push(id);
                    queue.push(id);
                    count++;
                }
            }
            render();
        }

        function render() {
            const nodesDiv = document.getElementById('node-layer');
            const svg = document.getElementById('svg-lines');
            nodesDiv.innerHTML = ""; svg.innerHTML = "";

            for (let id in tree) {
                const n = tree[id];
                if (n.parent) {
                    const p = tree[n.parent];
                    const line = document.createElementNS("http://www.w3.org", "line");
                    line.setAttribute("x1", p.x); line.setAttribute("y1", p.y);
                    line.setAttribute("x2", n.x); line.setAttribute("y2", n.y);
                    line.id = "l-" + id;
                    svg.appendChild(line);
                }

                const div = document.createElement('div');
                div.id = "n-" + id;
                div.className = "node hidden";
                div.style.left = n.x + "px"; div.style.top = n.y + "px";
                div.onclick = () => buy(id);
                div.innerHTML = `<div class="label"><b>${n.cost}</b></div>`;
                nodesDiv.appendChild(div);
            }
            update();
        }

        function buy(id) {
            const n = tree[id];
            if (state.owned.includes(n.parent) && !state.owned.includes(id) && state.petals >= n.cost) {
                state.petals -= n.cost;
                state.owned.push(id);
                state.cps += n.power;
                update();
            }
        }

        function update() {
            document.getElementById('score').innerText = Math.floor(state.petals);
            document.getElementById('cps').innerText = state.cps.toFixed(1);

            for (let id in tree) {
                const nodeEl = document.getElementById("n-" + id);
                const lineEl = document.getElementById("l-" + id);
                const isOwned = state.owned.includes(id);
                const isParentOwned = state.owned.includes(tree[id].parent);

                if (isOwned) {
                    nodeEl.className = "node owned";
                    if (lineEl) lineEl.classList.add('active');
                } else if (isParentOwned) {
                    nodeEl.className = "node buyable";
                    if (lineEl) lineEl.style.stroke = "#483d8b";
                } else {
                    nodeEl.className = "node hidden";
                }
            }
        }

        function clickPetal() { state.petals += 1 + (state.cps * 0.1); update(); }
        setInterval(() => { state.petals += state.cps/10; update(); }, 100);
        
        buildTree();
    </script>
</body>
</html>
