<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bassie's Bloom - Skill Tree</title>

<style>
:root { 
    --bg: #1e1b29; 
    --lavender-haze: rgba(147, 112, 219, 0.7);
    --bassie-pink: #ffb7c5;
    --bassie-purple: #9370db;
}

body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; }

/* ✨ GLOWING LINES */
line {
    stroke:#333;
    stroke-width:5;
    transition:0.3s;
}
line.active {
    stroke:var(--bassie-purple);
    filter: drop-shadow(0 0 6px var(--bassie-pink));
    animation: glow 1.5s infinite alternate;
}
@keyframes glow {
    from { stroke-width:5; }
    to { stroke-width:8; }
}

.node.locked::after {
    content:"";
    position:absolute;
    inset:-5px;
    background:var(--lavender-haze);
    border-radius:50%;
    filter:blur(8px);
}

.hiddenNode {
    display:none;
}
</style>
</head>

<body>

<script>
let game = {
cookies:0,
cps:0,
rebirths:0,
rebirthCost:720000000,

upgrades:{
root:{name:"Root",cost:15,power:1,count:0,req:null,x:50,y:50},

water:{name:"Water",cost:100,power:5,count:0,req:"root",x:30,y:300},
sun:{name:"Sun",cost:150,power:8,count:0,req:"root",x:70,y:300},

/* 🔓 HIDDEN AFTER REBIRTH */
secret1:{name:"Bassie Core",cost:5000,power:200,count:0,req:"sun",x:50,y:600, hidden:true},
secret2:{name:"Bassie God",cost:20000,power:1000,count:0,req:"secret1",x:50,y:900, hidden:true}
}
};

function rebirth(){
if(game.cookies >= game.rebirthCost){

game.cookies=0;
game.cps=0;
game.rebirths++;

/* 🔓 UNLOCK HIDDEN NODES */
for(let id in game.upgrades){
if(game.upgrades[id].hidden){
document.getElementById("node-"+id).classList.remove("hiddenNode");
}
}

game.rebirthCost *= 5;
update();
}
}

function initNodes(){
let c=document.getElementById("nodes-container");

for(let id in game.upgrades){
let u=game.upgrades[id];

let d=document.createElement("div");
d.id="node-"+id;
d.className="node";

if(u.hidden) d.classList.add("hiddenNode");

d.style.left=u.x+"%";
d.style.top=u.y+"px";

d.onclick=()=>buy(id);

d.innerHTML=`
<b>${u.name}</b><br>
${u.cost}
`;

c.appendChild(d);
}
}

function drawLines(){
let svg=document.getElementById("tree-svg");
svg.innerHTML="";

for(let id in game.upgrades){
let u=game.upgrades[id];
if(u.req){
let p=game.upgrades[u.req];

let line=document.createElementNS("http://www.w3.org/2000/svg","line");

line.setAttribute("x1",p.x+"%");
line.setAttribute("y1",(p.y+65)+"px");
line.setAttribute("x2",u.x+"%");
line.setAttribute("y2",(u.y+65)+"px");

if(p.count>0) line.classList.add("active");

svg.appendChild(line);
}
}
}
</script>

</body>
</html>
